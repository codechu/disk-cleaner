<?xml version="1.0" encoding="UTF-8"?>
<!--
  Codechu Disk Cleaner — primary mark (G3 Spotlight)
  Disk plate (radial-light navy) + D harfi + dairesel counter (spindle alanı) +
  altın spindle hub. Tüm logo system'in çekirdek glyph'i.

  Renkler:
    Disk gradient: #34507a (highlight) → #1d2939 (midtone) → #0f1928 (shadow)
    D + bg: #fafaf7 (off-white)
    Hub: #e0a020 (gold)

  Usage:
    - Standalone brand mark
    - App icon master (16-1024px)
    - Favicon kaynak
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200"
     role="img" aria-label="Codechu Disk Cleaner">
  <defs>
    <radialGradient id="diskLight" cx="0.32" cy="0.28" r="0.85">
      <stop offset="0%"  stop-color="#34507a"/>
      <stop offset="55%" stop-color="#1d2939"/>
      <stop offset="100%" stop-color="#0f1928"/>
    </radialGradient>
  </defs>
  <g transform="translate(100 100)">
    <!-- Disk plate -->
    <circle cx="0" cy="0" r="80" fill="url(#diskLight)"/>
    <!-- Subtle outline for dark-bg fallback (so disk edge survives) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#0a1320" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- D harfi -->
    <path d="M -38 -44 H 8 Q 48 -44 48 0 Q 48 44 8 44 H -38 Z" fill="#fafaf7"/>
    <!-- Dairesel counter (spindle area) -->
    <circle cx="10" cy="0" r="25" fill="#1d2939"/>
    <!-- Gold spindle hub -->
    <circle cx="10" cy="0" r="6" fill="#e0a020"/>
  </g>
</svg>
