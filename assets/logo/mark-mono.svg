<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mono: tek renkli — print, fax, embroidery, single-color silkscreen, GTK symbolic.
  Sadece silüet + counter cut-out. Hub yok (mono'da altın akmıyor).
  currentColor ile renklenir (GTK runtime'da theme rengi alır).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <g transform="translate(100 100)" fill="currentColor">
    <!-- Disk plate (mono) -->
    <circle cx="0" cy="0" r="80"/>
    <!-- D negative cut -->
    <path d="M -38 -44 H 8 Q 48 -44 48 0 Q 48 44 8 44 H -38 Z" fill="#fafaf7"/>
    <!-- Counter cut returns to disk -->
    <circle cx="10" cy="0" r="25"/>
  </g>
</svg>
