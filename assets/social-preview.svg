<?xml version="1.0" encoding="UTF-8"?>
<!--
  GitHub social preview — 1280×640 (v4.1, G3 mark + lockup + outline)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0f2545"/>
      <stop offset="100%" stop-color="#143055"/>
    </linearGradient>
    <radialGradient id="diskLight" cx="0.32" cy="0.28" r="0.85">
      <stop offset="0%"  stop-color="#5577a4"/>
      <stop offset="55%" stop-color="#2a3f5e"/>
      <stop offset="100%" stop-color="#162338"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Mark: sol-merkez, r=140 (önceki 160'tan küçük; daha rahat nefes) -->
  <g transform="translate(220 320)">
    <circle cx="0" cy="0" r="140" fill="url(#diskLight)"/>
    <!-- Outline for crisp edge against navy bg -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#08111e" stroke-width="2" stroke-opacity="0.6"/>
    <path d="M -66 -76 H 14 Q 84 -76 84 0 Q 84 76 14 76 H -66 Z" fill="#fafaf7"/>
    <circle cx="18" cy="0" r="44" fill="#162338"/>
    <circle cx="18" cy="0" r="10" fill="#e0a020"/>
  </g>

  <!-- Tipografi bloğu, dikey center ikon ekseniyle hizalı -->
  <g font-family="Inter, Ubuntu Sans, system-ui, sans-serif" fill="#ffffff">
    <text x="440" y="270" font-size="92" font-weight="700" letter-spacing="-2">Disk Cleaner</text>
    <text x="440" y="318" font-size="28" font-weight="400" opacity="0.82">Safe, transparent disk cleaner for Linux</text>
    <text x="440" y="388" font-size="20" font-weight="500" opacity="0.78" letter-spacing="0.5">Process-aware. Trash-by-default. Treemap + sunburst.</text>
    <text x="440" y="418" font-size="16" font-weight="400" opacity="0.50">MIT  ·  GTK 3  ·  Python 3.10+  ·  github.com/codechu/disk-cleaner</text>
  </g>
</svg>
