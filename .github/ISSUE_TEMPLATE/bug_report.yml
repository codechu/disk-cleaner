name: Bug report
description: Something doesn't work the way it should
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you get?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Disk Cleaner version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      placeholder: "Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Output of `disk-cleaner --scan` or the GUI's console.
      render: shell

  - type: checkboxes
    id: dryrun
    attributes:
      label: Safety
      options:
        - label: I reproduced this with `--dry-run` before reporting (no data was lost).
