name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: System deps (GTK / Cairo / GIO)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi gir1.2-gtk-3.0 python3-cairo \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            xvfb desktop-file-utils gettext

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile .mo translations
        run: cd po && make compile

      - name: Ruff lint
        run: ruff check disk_cleaner tests

      - name: Pytest + coverage
        run: |
          pytest -q --cov=disk_cleaner --cov-report=term-missing \
                    --cov-fail-under=35
        # Current threshold 35% reflects baseline (38% measured).
        # Roadmap target: 60% (core/score, _tasks, watchdog tested).
        # See docs/MAINTAINABILITY.md.

      - name: Validate .desktop file
        run: desktop-file-validate packaging/disk-cleaner.desktop

      - name: Validate appdata.xml
        run: |
          sudo apt-get install -y --no-install-recommends appstream
          appstreamcli validate --no-net packaging/disk-cleaner.appdata.xml || true

      - name: --help smoke test (xvfb)
        run: xvfb-run -a python3 -m disk_cleaner --help

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Bandit scan
        run: |
          # B602 (shell=True) ve B404 (subprocess imports) düşük şiddetli;
          # _tasks.py'deki sabit shell=True'lar code review ile onaylı.
          bandit -r disk_cleaner -ll --skip B404,B603,B607
